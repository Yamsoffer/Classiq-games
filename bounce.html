<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Classiq Mascot — Bounce!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --black:#191919; --panel:#282828; --pink:#F43764;
    --lime:#d7f75b; --teal:#119DA4; --grey:#C9CBC0;
    --offwhite:#F4F9E9; --dim:rgba(201,203,192,0.38); --border:rgba(201,203,192,0.1);
  }

  html,body {
    width:100%; min-height:100%;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    background-image: url('Albert/background.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family:'Lato',sans-serif;
    color:var(--grey);
    overflow:hidden;
  }

  #stars { position:fixed; inset:0; pointer-events:none; z-index:0; }

  #page {
    position:fixed;
    z-index:1;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 24px;
    gap:0;
  }

  /* Main container */
  .container {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:32px;
    text-align:center;
  }

  /* Character stage */
  .stage {
    position:relative;
    width:min(400px,80vw);
    height:min(500px,80vh);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    cursor:pointer;
  }

  .mascot {
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    transform-origin:50% 100%;
  }

  .mascot img {
    display:block;
    height:100%;
    width:auto;
    object-fit:contain;
    filter:drop-shadow(0 30px 60px rgba(0,0,0,0.6))
           drop-shadow(0 0 40px rgba(17,157,164,0.25));
    opacity:0;
    position:absolute;
    transition:none;
  }

  .mascot img.active {
    opacity:1;
  }

  /* Frame animation */
  .mascot {
    animation:none;
  }

  .mascot.animating {
    animation:jump-motion 2s infinite ease-in;
  }

  @keyframes jump-motion {
    /* Crouching - bending knees */
    0% { transform:translateY(14px) scale(1.10, 0.90); }
    12% { transform:translateY(14px) scale(1.10, 0.90); }

    /* Smooth transition up */
    18% { transform:translateY(-40px) scale(1.03, 0.97); }
    25% { transform:translateY(-90px) scale(0.98, 1.02); }

    /* Peak position - STAY FOR 1 SECOND */
    30% { transform:translateY(-150px) scale(0.92, 1.08); }
    80% { transform:translateY(-150px) scale(0.92, 1.08); }

    /* Smooth transition down */
    92% { transform:translateY(-50px) scale(0.98, 1.02); }

    /* Land on ground - back to crouch */
    100% { transform:translateY(14px) scale(1.10, 0.90); }
  }

  /* Shadow */
  .stage::after {
    content:'';
    position:absolute;
    bottom:-10px;
    left:50%;
    transform:translateX(-50%);
    width:70%;
    height:30px;
    background:radial-gradient(ellipse, rgba(17,157,164,0.4), transparent 70%);
    filter:blur(12px);
    z-index:-1;
  }

  /* Text content */
  .content {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }

  .headline {
    font-size:clamp(20px, 5vw, 48px);
    font-weight:900;
    color:var(--offwhite);
    letter-spacing:0.02em;
  }

  .subheadline {
    font-size:clamp(14px, 2.5vw, 20px);
    font-weight:700;
    color:var(--lime);
    letter-spacing:0.05em;
  }

  .description {
    font-size:14px;
    line-height:1.8;
    color:var(--dim);
    max-width:500px;
  }

  .cta-text {
    font-size:12px;
    color:var(--dim);
    margin-top:8px;
    letter-spacing:0.05em;
  }

  .cta-text strong {
    color:var(--pink);
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .mascot {
      animation:none !important;
    }
  }

  /* Responsive */
  @media (max-width: 768px) {
    #page {
      padding:24px 16px;
    }

    .container {
      gap:24px;
    }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="page">
  <div class="container">

    <!-- Character stage -->
    <div class="stage">
      <div class="mascot animating">
        <img class="active" src="Albert/jumping.png" alt="Crouching - bending knees" />
        <img src="Albert/jumping.png" alt="Jumping - launching upward" />
      </div>
    </div>

    <!-- Text content -->
    <div class="content">
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <div style="font-size:clamp(80px,20vw,200px); font-weight:900; color:var(--teal); letter-spacing:0.05em;">ALBERT<span style="color:var(--lime); font-size:0.6em; margin-left:12px;">●</span></div>
        <div class="headline" style="font-size:clamp(20px,3vw,32px); margin:0;">The first Quantum Engineering Agent</div>
      </div>
      <div class="description">
        Meet our cheerful quantum engineer companion. Ready to help you build amazing quantum algorithms!
      </div>
    </div>

  </div>
</div>

<script>
const sc = document.getElementById('stars');
const sCtx = sc.getContext('2d');
let stars = [];

function init() {
  sc.width = window.innerWidth;
  sc.height = window.innerHeight;
  stars = [];
  const cols = ['rgba(244,249,233,', 'rgba(215,247,91,', 'rgba(17,157,164,'];
  for(let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * sc.width,
      y: Math.random() * sc.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random() * 0.6 + 0.1,
      speed: Math.random() * 0.3 + 0.05,
      col: cols[Math.floor(Math.random() * cols.length)]
    });
  }
}

function draw() {
  requestAnimationFrame(draw);
  sCtx.clearRect(0, 0, sc.width, sc.height);
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > sc.height) {
      s.y = 0;
      s.x = Math.random() * sc.width;
    }
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = s.col + s.a + ')';
    sCtx.fill();
  });
}

window.addEventListener('resize', init);
init();
draw();

/* Frame-based animation */
(function() {
  const mascot = document.querySelector('.mascot');
  const frames = document.querySelectorAll('.mascot img');
  if (!frames.length) return;

  let currentFrame = 0;
  let isAnimating = true;
  const normalFrameDuration = 600; // ms per jump frame
  const groundPauseDuration = 5000; // 5 seconds on ground

  function showFrame(index) {
    frames.forEach((frame, i) => {
      frame.classList.toggle('active', i === index);
    });
  }

  function animate() {
    if (!isAnimating) return;
    currentFrame = (currentFrame + 1) % frames.length;
    showFrame(currentFrame);
    // Last frame (albert-air.png) pauses for 5 seconds before next jump
    const delay = (currentFrame === frames.length - 1) ? groundPauseDuration : normalFrameDuration;
    setTimeout(animate, delay);
  }

  // Start animation
  animate();

  // Click to accelerate/speed up
  const stage = document.querySelector('.stage');
  stage.addEventListener('click', function() {
    isAnimating = false;
    frames.forEach(f => f.classList.remove('active'));

    // Rapid cycling on click
    let rapid = 0;
    const rapidInterval = setInterval(() => {
      rapid++;
      showFrame(rapid % frames.length);
      if (rapid > 8) {
        clearInterval(rapidInterval);
        isAnimating = true;
        currentFrame = 0;
        animate();
      }
    }, 80);
  });
})();
</script>

</body>
</html>
